name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev pkg-config

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium pkg-config
      
      - name: Cache vcpkg
        uses: actions/cache@v4
        if: runner.os == 'Windows'
        with:
            path: |
              C:\vcpkg\installed
              C:\Users\runneradmin\AppData\Local\vcpkg\archives
            key: vcpkg-${{ runner.os }}-libsodium-1.0.22
            restore-keys: vcpkg-${{ runner.os }}-
      
      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install libsodium:x64-windows
        # Assumes VCPKG_ROOT is set by the runner; windows-latest has vcpkg pre-installed.

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix libsodium)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libsodium)" >> $GITHUB_ENV
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Debug libsodium paths
        if: runner.os == 'macOS'
        run: |
          brew --prefix libsodium
          pkg-config --libs --cflags libsodium
          ls $(brew --prefix libsodium)/lib/

                
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel 4
      
      - name: Cache CMake build deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-1.14.0-${{ runner.os }}
