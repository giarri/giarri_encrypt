name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v6
      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install libsodium

      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsodium-dev

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix libsodium)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libsodium)" >> $GITHUB_ENV

      - name: cmake build (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: cmake build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel 4
