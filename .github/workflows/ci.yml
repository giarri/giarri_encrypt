name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v6

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Cache vcpkg
        uses: actions/cache@v5
        id: cache-vcpkg
        if: runner.os == 'Windows'
        with:
          path: |
            C:\vcpkg
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-libsodium-1.0.22
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure vcpkg binary caching
        if: runner.os == 'Windows'
        run: echo "VCPKG_BINARY_SOURCES=clear;files,C:\Users\runneradmin\AppData\Local\vcpkg\archives,readwrite" >> $env:GITHUB_ENV

      - name: Install libsodium (Windows)
        if: runner.os == 'Windows' &&
            steps.cache-vpkg.outputs.cache-hit != 'true'
        run: vcpkg install libsodium:x64-windows

      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsodium-dev

      # ── CMake dependency cache ────────────────────────────────────────────────
      - name: Cache CMake build deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-1.14.0-${{ runner.os }}
          restore-keys: gtest-${{ runner.os }}-


      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix libsodium)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libsodium)" >> $GITHUB_ENV

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --parallel 4